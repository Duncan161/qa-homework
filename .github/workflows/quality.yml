name: Quality Pipeline # Название пайплайна, которое будет видно на GitHub

on: [push, pull_request] # Запускать при каждом пуше или создании Pull Request

jobs:
  quality-check:
    runs-on: ubuntu-latest # Запускать на свежей версии Ubuntu

    steps:
      # 1. Скачиваем код твоего репозитория
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Устанавливаем Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Устанавливаем зависимости из requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Запускаем линтер Pylint
      # --fail-under=7.0 означает: если оценка кода ниже 7.0, пайплайн упадет (станет красным)
      - name: Lint with pylint
        run: |
          pylint calculator.py --fail-under=7.0

      # 5. Запускаем тесты и проверяем покрытие
      # --cov=calculator говорит проверять файл calculator.py
      # --cov-fail-under=70 говорит: если покрытие меньше 70%, пайплайн упадет
      # --cov-report=html создает красивую папку с отчетом
      - name: Run tests with coverage
        run: |
          pytest --cov=calculator --cov-fail-under=70 --cov-report=html test_calculator.py

      # 6. Сохраняем отчет о покрытии как артефакт (чтобы можно было скачать)
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-report
          path: htmlcov/